<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Novinky — Finance & Hypotéky</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #FAFAF8;
    --paper-dark: #F4F3EE;
    --ink: #0F1419;
    --ink-soft: #2A2F36;
    --emerald: #047857;
    --emerald-bright: #10B981;
    --emerald-soft: #ECFDF5;
    --blue: #1E5A8A;
    --blue-soft: #EFF6FF;
    --gray-500: #6B7178;
    --gray-300: #B8BCC1;
    --gray-200: #DCDEDF;
    --gray-100: #EBEDEC;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--paper);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    font-feature-settings: 'cv11','ss01';
  }
  h1, h2, h3 { font-family: 'Inter Tight', 'Inter', sans-serif; letter-spacing: -0.02em; }
  header {
    background: var(--ink); color: #fff;
    padding: 14px 24px; display: flex; align-items: center; gap: 18px;
    position: relative;
  }
  header::after {
    content: ''; position: absolute;
    bottom: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent 0%, var(--emerald-bright) 50%, transparent 100%);
    opacity: 0.4;
  }
  header a { color: rgba(255,255,255,0.55); text-decoration: none; font-size: 0.85rem; font-weight: 500; transition: color 0.15s; }
  header a:hover { color: #fff; }
  header h1 { font-size: 1.05rem; font-weight: 700; letter-spacing: -0.01em; }
  .user-info { margin-left: auto; font-size: 0.85rem; color: rgba(255,255,255,0.55); display: flex; align-items: center; gap: 14px; }
  .user-info span { color: rgba(255,255,255,0.85); }
  .container { max-width: 1080px; margin: 0 auto; padding: 28px 18px; }
  .tabs { display: flex; gap: 6px; margin-bottom: 22px; flex-wrap: wrap; align-items: center; }
  .tab {
    padding: 7px 16px; border-radius: 999px; border: 1px solid var(--gray-200);
    cursor: pointer; font-size: 0.86rem; font-weight: 500;
    background: #fff; color: var(--ink-soft);
    font-family: inherit; transition: all 0.15s;
  }
  .tab.active { background: var(--ink); color: #fff; border-color: var(--ink); }
  .tab:hover:not(.active) { background: var(--paper-dark); border-color: var(--gray-300); }
  .refresh-btn {
    margin-left: auto; padding: 7px 14px; border-radius: 6px;
    border: 1px solid var(--gray-200); background: #fff;
    color: var(--ink-soft); font-size: 0.82rem; font-weight: 500;
    cursor: pointer; font-family: inherit; transition: all 0.15s;
  }
  .refresh-btn:hover { background: var(--paper-dark); border-color: var(--gray-300); }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 14px; }
  .card {
    background: #fff; border-radius: 10px; padding: 18px;
    border: 1px solid var(--gray-200);
    box-shadow: 0 1px 2px rgba(15,20,25,0.04);
    display: flex; flex-direction: column; gap: 10px;
    transition: all 0.18s;
  }
  .card:hover { box-shadow: 0 4px 16px rgba(15,20,25,0.08); border-color: var(--gray-300); transform: translateY(-1px); }
  .card-cat {
    font-size: 0.7rem; font-weight: 600;
    letter-spacing: 0.02em; padding: 3px 9px; border-radius: 5px;
    align-self: flex-start;
    font-family: 'JetBrains Mono', monospace;
  }
  .cat-hypoteky { background: var(--emerald-soft); color: var(--emerald); border: 1px solid rgba(4,120,87,0.2); }
  .cat-finance { background: var(--blue-soft); color: var(--blue); border: 1px solid rgba(30,90,138,0.2); }
  .card-title { font-size: 0.92rem; font-weight: 600; line-height: 1.45; letter-spacing: -0.005em; }
  .card-title a { color: var(--ink); text-decoration: none; }
  .card-title a:hover { color: var(--emerald); }
  .card-desc { font-size: 0.83rem; color: var(--gray-500); line-height: 1.55; flex: 1; }
  .card-footer {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 0.74rem; color: var(--gray-300); margin-top: 6px;
    padding-top: 10px; border-top: 1px solid var(--gray-100);
    font-family: 'JetBrains Mono', monospace;
  }
  .source-badge { font-weight: 600; color: var(--gray-500); }
  .loading { text-align: center; padding: 60px; color: var(--gray-500); font-size: 0.95rem; }
  .empty { text-align: center; padding: 60px; color: var(--gray-500); }
  .admin-bar {
    background: #fff; border-bottom: 1px solid var(--gray-200);
    padding: 10px 24px; font-size: 0.82rem; color: var(--gray-500);
    display: none; align-items: center; gap: 12px;
  }
  .admin-bar button {
    padding: 5px 12px; border-radius: 5px; border: 1px solid var(--gray-200);
    background: #fff; cursor: pointer; font-size: 0.8rem;
    font-family: inherit; color: var(--ink-soft); font-weight: 500;
  }
  .admin-bar button:hover { background: var(--paper-dark); border-color: var(--gray-300); }
</style>
</head>
<body>
<header>
  <a href="/dashboard.html">← Zpět</a>
  <h1>📰 Novinky</h1>
  <div class="user-info">
    <span id="user-name"></span>
    <a href="#" onclick="logout()" style="color:#aaa">Odhlásit</a>
  </div>
</header>
<div class="admin-bar" id="admin-bar">
  Admin:
  <button onclick="forceRefresh()">🔄 Obnovit zdroje nyní</button>
</div>
<div class="container">
  <div class="tabs">
    <button class="tab active" onclick="setTab('', this)">Vše</button>
    <button class="tab" onclick="setTab('hypoteky', this)">🏠 Hypotéky & úvěry</button>
    <button class="tab" onclick="setTab('finance', this)">📈 Finance</button>
    <button class="refresh-btn" onclick="loadNews(currentTab)">↻ Obnovit</button>
  </div>
  <div id="content" class="loading">Načítám novinky...</div>
</div>

<script>
const tok = localStorage.getItem('auth_token');
if (!tok) { window.location.href = '/'; }

let currentTab = '';
let isAdmin = false;

async function init() {
  try {
    const res = await fetch('/api/me', { headers: { Authorization: `Bearer ${tok}` } });
    const me = await res.json();
    document.getElementById('user-name').textContent = me.jmeno;
    isAdmin = me.role === 'admin';
    if (isAdmin) document.getElementById('admin-bar').style.display = 'flex';
  } catch(e) { window.location.href = '/'; }
  loadNews('');
}

async function loadNews(category) {
  currentTab = category;
  document.getElementById('content').innerHTML = '<div class="loading">Načítám novinky...</div>';
  try {
    const url = '/api/news' + (category ? `?category=${category}` : '');
    const res = await fetch(url, { headers: { Authorization: `Bearer ${tok}` } });
    const articles = await res.json();
    renderArticles(articles);
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="empty">Chyba při načítání novinek.</div>';
  }
}

function renderArticles(articles) {
  if (!articles.length) {
    document.getElementById('content').innerHTML = '<div class="empty">Žádné novinky k dispozici.</div>';
    return;
  }
  const html = `<div class="grid">${articles.map(a => `
    <div class="card">
      <span class="card-cat cat-${a.category}">${a.category === 'hypoteky' ? '🏠 Hypotéky' : '📈 Finance'}</span>
      <div class="card-title"><a href="${escHtml(a.url)}" target="_blank" rel="noopener">${escHtml(a.title)}</a></div>
      ${a.description ? `<div class="card-desc">${escHtml(a.description)}</div>` : ''}
      <div class="card-footer">
        <span class="source-badge">${escHtml(a.source)}</span>
        <span>${formatDate(a.published_at)}</span>
      </div>
    </div>
  `).join('')}</div>`;
  document.getElementById('content').innerHTML = html;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatDate(s) {
  if (!s) return '';
  try {
    return new Date(s).toLocaleDateString('cs-CZ', { day: 'numeric', month: 'short' });
  } catch(e) { return s.slice(0, 10); }
}

function setTab(cat, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  loadNews(cat);
}

async function forceRefresh() {
  if (!isAdmin) return;
  try {
    await fetch('/api/news/refresh', { method: 'POST', headers: { Authorization: `Bearer ${tok}` } });
    loadNews(currentTab);
  } catch(e) { alert('Chyba při obnovování.'); }
}

function logout() {
  localStorage.removeItem('auth_token');
  window.location.href = '/';
}

init();
</script>
</body>
</html>
